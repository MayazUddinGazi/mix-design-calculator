<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortar Mix Design Calculator — Mayaz Uddin Gazi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafbfc;
  --bg2: #f0f2f5;
  --card: #ffffff;
  --card-hover: #f8f9fb;
  --border: #e4e7ec;
  --border2: #d0d5dd;
  --text: #101828;
  --text2: #344054;
  --text3: #667085;
  --text4: #98a2b3;
  --accent: #1570ef;
  --accent2: #175cd3;
  --accent-bg: #eff8ff;
  --accent-border: #b2ddff;
  --green: #12b76a;
  --red: #f04438;
  --shadow: 0 1px 2px rgba(16,24,40,0.05);
  --shadow2: 0 4px 8px -2px rgba(16,24,40,0.1), 0 2px 4px -2px rgba(16,24,40,0.06);
  --radius: 10px;
  --radius2: 14px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --c1:#1570ef; --c2:#7a5af8; --c3:#0e9384; --c4:#f79009; --c5:#f04438;
}
[data-theme="dark"] {
  --bg: #0c111d; --bg2: #161b26; --card: #1f242f; --card-hover: #282e3a;
  --border: #333b4a; --border2: #3e4756; --text: #f5f5f6; --text2: #cecfd2;
  --text3: #94969c; --text4: #61646c; --accent: #528bff; --accent2: #84adff;
  --accent-bg: rgba(82,139,255,0.1); --accent-border: rgba(82,139,255,0.25);
  --green: #47cd89; --red: #f97066;
  --shadow: 0 1px 2px rgba(0,0,0,0.3); --shadow2: 0 4px 8px rgba(0,0,0,0.3);
  --c1:#528bff; --c2:#9b8afb; --c3:#2ed3b7; --c4:#fdb022; --c5:#f97066;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .3s;-webkit-font-smoothing:antialiased;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.anim{animation:fadeUp .5s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}

.header{background:var(--card);border-bottom:1px solid var(--border);padding:20px 28px;transition:all .3s}
.header-inner{max-width:960px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.title-dot{color:var(--accent)}
.subtitle{font-size:12px;color:var(--text3);margin-top:2px}
.author{font-size:10px;color:var(--text4);margin-top:3px;letter-spacing:.04em;font-family:var(--mono)}
.header-right{display:flex;align-items:center;gap:10px}
.badge{display:flex;flex-direction:column;align-items:flex-end;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:6px 12px;transition:all .3s}
.badge-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.badge-value{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)}
.icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .3s;color:var(--text3)}
.icon-btn:hover{background:var(--bg2);border-color:var(--border2);transform:rotate(12deg)}
.print-btn{height:38px;padding:0 13px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text3);font-family:var(--sans);transition:all .3s}
.print-btn:hover{background:var(--bg2);border-color:var(--border2);color:var(--text2)}
.print-btn svg{width:15px;height:15px}

.tab-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;transition:all .3s;position:sticky;top:0;z-index:10}
.tab-inner{max-width:960px;margin:0 auto;display:flex;overflow-x:auto;gap:2px}
.tab-btn{padding:13px 14px;border:none;background:0;cursor:pointer;font-size:13px;font-weight:600;color:var(--text4);border-bottom:2px solid transparent;transition:all .25s;white-space:nowrap;font-family:var(--sans)}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{padding:20px 28px 100px;max-width:960px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.sec-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-title:first-child{margin-top:4px}
.sec-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.spec-card{background:var(--card);border-radius:var(--radius2);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);transition:all .3s}
.spec-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px);border-color:var(--border2)}
.spec-top{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border);transition:background .3s}
.spec-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:var(--mono);color:#fff}
.spec-icon.cube{background:linear-gradient(135deg,#1570ef,#175cd3)}
.spec-icon.cyl{background:linear-gradient(135deg,#7a5af8,#6938ef)}
.spec-icon.prism{background:linear-gradient(135deg,#0e9384,#107569)}
.spec-nm{font-weight:700;font-size:14px}
.spec-dm{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.spec-body{padding:12px 16px}
.spec-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.spec-lbl{font-size:12px;color:var(--text3)}
.spec-v{font-size:12px;font-family:var(--mono);color:var(--text2)}
.spec-vb{font-size:14px;font-family:var(--mono);font-weight:700;color:var(--accent)}
.spec-tot{border-top:1px solid var(--border);margin-top:6px;padding-top:8px}

.inp{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--mono);text-align:center;background:var(--bg);color:var(--text);outline:none;transition:all .25s;width:64px}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(21,112,239,.12)}
.inp-tbl{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--mono);text-align:center;background:var(--bg);color:var(--text);outline:none;transition:all .25s}
.inp-tbl:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(21,112,239,.12)}

.summary{display:flex;flex-wrap:wrap;gap:20px;margin-top:20px;padding:18px 22px;background:var(--card);border-radius:var(--radius2);border:1px solid var(--border);box-shadow:var(--shadow);align-items:center;transition:all .3s}
.sum-item{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px}
.sum-lbl{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.sum-val{font-size:16px;font-weight:700;font-family:var(--mono)}
.sum-hl{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)}
.sum-sm{font-size:10px;color:var(--text4);font-family:var(--mono)}

.tbl{background:var(--card);border-radius:var(--radius2);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);transition:all .3s}
.tbl-row{display:flex;border-bottom:1px solid var(--border);align-items:center;transition:background .2s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:not(.tbl-hdr):hover{background:var(--card-hover)}
.tbl-hdr{background:var(--bg2);font-weight:700;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.tbl-cell{flex:1;padding:11px 14px;font-size:13px;font-family:var(--mono);min-width:0;overflow:hidden;text-overflow:ellipsis}
.c-w{flex:1.5}.c-2x{flex:2}.c-b{font-weight:600;font-family:var(--sans)}.c-t{font-weight:700;color:var(--accent)}.c-n{flex:.4;display:flex;justify-content:center}

.add-btn{margin-top:14px;padding:10px 22px;border:1px dashed var(--border2);border-radius:var(--radius);background:0;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);font-family:var(--sans);transition:all .3s}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.rm-btn{width:26px;height:26px;border:1px solid var(--border);background:var(--card);color:var(--text4);border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.rm-btn:hover{background:rgba(240,68,56,.1);color:var(--red);border-color:var(--red)}

.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.mat-card{background:var(--card);border-radius:var(--radius2);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);transition:all .3s}
.mat-card:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}
.mat-nm{font-weight:700;font-size:13px;margin-bottom:10px}
.mat-r{display:flex;align-items:center;gap:8px}
.mat-l{font-size:12px;color:var(--text3);font-weight:600}
.mat-tag{margin-top:10px;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text4);font-weight:700;background:var(--bg2);display:inline-block;padding:3px 8px;border-radius:4px}
.ratio-row{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.ratio-item{display:flex;flex-direction:column;gap:6px}
.ratio-lbl{font-size:12px;font-weight:600;color:var(--text2)}
.abs-box{margin-top:24px;padding:18px 22px;background:var(--accent-bg);border-radius:var(--radius2);border:1px solid var(--accent-border);transition:all .3s}
.abs-title{font-weight:700;font-size:14px;margin-bottom:12px;color:var(--accent2)}
[data-theme="dark"] .abs-title{color:var(--accent)}
.abs-grid{display:flex;gap:28px;flex-wrap:wrap}
.abs-lbl{font-size:12px;color:var(--text3);margin-right:6px}
.abs-val{font-size:15px;font-weight:700;font-family:var(--mono)}

.res-note{font-size:12px;color:var(--text3);margin-bottom:14px;font-family:var(--mono)}
.res-scroll{overflow-x:auto;margin-bottom:10px}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-top:10px}
.ov-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow);transition:all .3s;border-left:4px solid var(--accent)}
.ov-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.ov-lbl{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.ov-kg{font-size:20px;font-weight:700;font-family:var(--mono)}
.ov-g{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.ov-lb{font-size:11px;color:var(--text4);font-family:var(--mono);margin-top:1px}

.chart-box{background:var(--card);border-radius:var(--radius2);border:1px solid var(--border);padding:24px;box-shadow:var(--shadow);margin-top:10px;transition:all .3s}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:200px;padding:0 8px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar-stack{display:flex;align-items:flex-end;gap:2px;width:100%;justify-content:center;height:calc(100% - 28px)}
.bar{width:100%;max-width:28px;border-radius:4px 4px 0 0;transition:all .4s;cursor:pointer;transform-origin:bottom;animation:barGrow .6s ease both}
.bar:hover{opacity:.8;transform:scaleY(1.02)}
.bar-label{font-size:10px;color:var(--text4);font-family:var(--mono);text-align:center;font-weight:600;white-space:nowrap}
.legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.pie-wrap{display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center}
.pie-svg{width:180px;height:180px}
.pie-leg{display:flex;flex-direction:column;gap:8px}
.pie-item{display:flex;align-items:center;gap:8px}
.pie-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.pie-txt{font-size:13px;color:var(--text2)}
.pie-pct{font-family:var(--mono);font-weight:600;font-size:13px}

.footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);font-size:10px;text-align:center;padding:6px 8px;color:var(--text4);font-family:var(--mono);letter-spacing:.03em;transition:all .3s;display:flex;flex-direction:column;gap:2px}
.footer-credits{font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}

@media print{
  .tab-bar,.icon-btn,.print-btn,.footer-bar,.add-btn,.rm-btn{display:none!important}
  .panel{display:block!important;page-break-inside:avoid}
  .header{border-bottom:2px solid #000}
  body{background:#fff;color:#000}
  .spec-card,.mat-card,.ov-card,.tbl,.chart-box,.summary,.abs-box{box-shadow:none;border:1px solid #ccc}
}
@media(max-width:640px){
  .header{padding:16px}.main{padding:14px 14px 100px}.tab-bar{padding:0 12px}
  .card-grid{grid-template-columns:1fr}.mat-grid{grid-template-columns:repeat(2,1fr)}
  .ov-grid{grid-template-columns:repeat(2,1fr)}.title{font-size:16px}
  .tbl-cell{padding:8px 8px;font-size:11px}.summary{gap:12px;padding:14px 16px}
  .pie-wrap{flex-direction:column}.bar-chart{height:160px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <h1 class="title">Mortar Mix Design<span class="title-dot">.</span></h1>
      <p class="subtitle">Absolute Volume Method — Biochar · SCM · Seawater</p>
      <p class="author">Mayaz Uddin Gazi · PhD Student · University of Miami</p>
    </div>
    <div class="header-right">
      <div class="badge"><span class="badge-label">Vol/Batch</span><span class="badge-value" id="hB">—</span></div>
      <button class="print-btn" onclick="window.print()" title="Print / Save as PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button class="icon-btn" id="thBtn" title="Toggle theme">☀️</button>
    </div>
  </div>
</header>

<nav class="tab-bar"><div class="tab-inner">
  <button class="tab-btn active" data-tab="specimens">⬡ Specimens</button>
  <button class="tab-btn" data-tab="mixes">⚗ Mix Designs</button>
  <button class="tab-btn" data-tab="materials">◈ Materials</button>
  <button class="tab-btn" data-tab="results">📊 Results</button>
  <button class="tab-btn" data-tab="charts">📈 Charts</button>
</div></nav>

<main class="main">
  <div class="panel active" id="p-specimens"></div>
  <div class="panel" id="p-mixes"></div>
  <div class="panel" id="p-materials"></div>
  <div class="panel" id="p-results"></div>
  <div class="panel" id="p-charts"></div>
</main>

<div class="footer-bar">
  <span id="fInfo"></span>
  <span class="footer-credits">Mayaz Uddin Gazi · PhD Student · University of Miami</span>
</div>

<script>
const S={
  specs:[
    {id:'cube',name:'50mm Cube',shape:'cube',a:50,count:21,label:'50×50×50 mm'},
    {id:'cyl',name:'75×150 Cylinder',shape:'cylinder',d:75,h:150,count:6,label:'Ø75×150 mm'},
    {id:'prism',name:'25×25×285 Prism',shape:'prism',l:25,w:25,h:285,count:3,label:'25×25×285 mm'},
  ],
  mixes:[
    {id:'m1',name:'Mix 1',cement:100,flyash:0,biochar:0},
    {id:'m2',name:'Mix 2',cement:85,flyash:15,biochar:0},
    {id:'m3',name:'Mix 3',cement:80,flyash:15,biochar:5},
    {id:'m4',name:'Mix 4',cement:75,flyash:15,biochar:10},
    {id:'m5',name:'Mix 5',cement:70,flyash:15,biochar:15},
  ],
  mats:[
    {id:'cement',name:'Portland Cement',sg:3.15,unit:'binder'},
    {id:'flyash',name:'Fly Ash',sg:2.2,unit:'binder'},
    {id:'biochar',name:'Biochar',sg:1.5,unit:'binder'},
    {id:'sand',name:'Sand (FA)',sg:2.65,unit:'aggregate'},
    {id:'seawater',name:'Seawater',sg:1.025,unit:'water'},
  ],
  r:{binder:1,sand:3,water:0.5},
  wastage:20,nMix:5,
};

function vol(s){if(s.shape==='cube'){const a=s.a/1000;return a*a*a}if(s.shape==='cylinder'){const r=(s.d/2)/1000;return Math.PI*r*r*(s.h/1000)}return(s.l/1000)*(s.w/1000)*(s.h/1000)}
function f(n,d=4){if(n===0)return'0';if(Math.abs(n)<1e-4)return n.toExponential(2);return parseFloat(n.toFixed(d)).toString()}
function fk(n){return parseFloat(n.toFixed(3)).toString()}
function fg(n){return parseFloat(n.toFixed(1)).toString()}
function gVD(){const sv=S.specs.map(s=>{const u=vol(s);return{...s,uv:u,tv:u*s.count,ul:u*1000,tl:u*s.count*1000}});const raw=sv.reduce((a,s)=>a+s.tv,0);const ww=raw*(1+S.wastage/100);return{sv,raw,ww,pb:ww/S.nMix}}
function gAV(){const c=S.mats.find(m=>m.id==='cement')?.sg||3.15,s=S.mats.find(m=>m.id==='sand')?.sg||2.65,w=S.mats.find(m=>m.id==='seawater')?.sg||1.025;const fac=1/(c*1000)+S.r.sand/(s*1000)+S.r.water/(w*1000);const b=1/fac;return{b,s:S.r.sand*b,w:S.r.water*b}}
function gBD(){const vd=gVD(),av=gAV(),v=vd.pb,bt=av.b*v,st=av.s*v,wt=av.w*v;return S.mixes.map(m=>({...m,binder:bt,ck:bt*m.cement/100,fk:bt*m.flyash/100,bk:bt*m.biochar/100,sk:st,wk:wt,tk:bt*m.cement/100+bt*m.flyash/100+bt*m.biochar/100+st+wt}))}

let dark=false;
document.getElementById('thBtn').addEventListener('click',()=>{dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'');document.getElementById('thBtn').textContent=dark?'🌙':'☀️'});
document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('p-'+b.dataset.tab).classList.add('active');render()})});

function pieArc(cx,cy,r,sa,ea){const s=sa*Math.PI/180-Math.PI/2,e=ea*Math.PI/180-Math.PI/2;const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);return`M${cx},${cy}L${x1},${y1}A${r},${r},0,${(ea-sa)>180?1:0},1,${x2},${y2}Z`}

function render(){
  const vd=gVD(),av=gAV(),bd=gBD();
  document.getElementById('hB').textContent=f(vd.pb*1000,2)+' L';
  document.getElementById('fInfo').textContent=`Absolute Volume Method · ${S.wastage}% wastage · ρ_w = 1000 kg/m³`;

  // SPECIMENS
  document.getElementById('p-specimens').innerHTML=`
    <div class="sec-title" style="margin-top:4px"><span class="sec-dot"></span>Specimen Counts & Volumes</div>
    <div class="card-grid">${vd.sv.map((s,i)=>`
      <div class="spec-card anim d${i+1}">
        <div class="spec-top">
          <div class="spec-icon ${s.shape==='cube'?'cube':s.shape==='cylinder'?'cyl':'prism'}">${s.shape==='cube'?'▣':s.shape==='cylinder'?'⬭':'▭'}</div>
          <div><div class="spec-nm">${s.name}</div><div class="spec-dm">${s.label}</div></div>
        </div>
        <div class="spec-body">
          <div class="spec-row"><span class="spec-lbl">Unit volume</span><span class="spec-v">${f(s.uv,6)} m³ (${f(s.ul,3)} L)</span></div>
          <div class="spec-row"><span class="spec-lbl">Count</span><input type="number" min="0" value="${s.count}" class="inp" data-sid="${s.id}" onchange="uSpec(this)"></div>
          <div class="spec-row spec-tot"><span class="spec-lbl">Total volume</span><span class="spec-vb">${f(s.tl,3)} L</span></div>
        </div>
      </div>`).join('')}</div>
    <div class="summary anim d4">
      <div class="sum-item"><span class="sum-lbl">Raw Total</span><span class="sum-val">${f(vd.raw*1000,2)} L</span></div>
      <div class="sum-item"><span class="sum-lbl">Wastage</span><input type="number" min="0" max="50" value="${S.wastage}" class="inp" style="width:50px" onchange="S.wastage=Math.max(0,parseFloat(this.value)||0);render()"><span style="font-size:12px;color:var(--text3)">%</span></div>
      <div class="sum-item"><span class="sum-lbl">With Wastage</span><span class="sum-hl">${f(vd.ww*1000,2)} L</span></div>
      <div class="sum-item"><span class="sum-lbl"># Mixes</span><input type="number" min="1" max="20" value="${S.nMix}" class="inp" style="width:50px" onchange="S.nMix=Math.max(1,parseInt(this.value)||1);render()"></div>
      <div class="sum-item"><span class="sum-lbl">Vol / Batch</span><span class="sum-hl">${f(vd.pb*1000,3)} L</span><span class="sum-sm">(${f(vd.pb,6)} m³)</span></div>
    </div>`;

  // MIXES
  document.getElementById('p-mixes').innerHTML=`
    <div class="sec-title" style="margin-top:4px"><span class="sec-dot"></span>Binder Proportions (% of total binder)</div>
    <div class="tbl anim">
      <div class="tbl-row tbl-hdr"><div class="tbl-cell c-2x">Mix</div><div class="tbl-cell">Cement %</div><div class="tbl-cell">Fly Ash %</div><div class="tbl-cell">Biochar %</div><div class="tbl-cell">Sum</div><div class="tbl-cell c-n"></div></div>
      ${S.mixes.map((m,i)=>{const sm=m.cement+m.flyash+m.biochar;return`
        <div class="tbl-row">
          <div class="tbl-cell c-2x c-b">${m.name}</div>
          <div class="tbl-cell"><input type="number" value="${m.cement}" class="inp-tbl" onchange="uMix(${i},'cement',this.value)"></div>
          <div class="tbl-cell"><input type="number" value="${m.flyash}" class="inp-tbl" onchange="uMix(${i},'flyash',this.value)"></div>
          <div class="tbl-cell"><input type="number" value="${m.biochar}" class="inp-tbl" onchange="uMix(${i},'biochar',this.value)"></div>
          <div class="tbl-cell" style="color:${Math.abs(sm-100)<.1?'var(--green)':'var(--red)'};font-weight:700">${sm}%</div>
          <div class="tbl-cell c-n">${S.mixes.length>1?`<button class="rm-btn" onclick="rmMix(${i})">×</button>`:''}</div>
        </div>`}).join('')}
    </div>
    <button class="add-btn" onclick="addMix()">+ Add Mix</button>`;

  // MATERIALS
  document.getElementById('p-materials').innerHTML=`
    <div class="sec-title" style="margin-top:4px"><span class="sec-dot"></span>Specific Gravities</div>
    <div class="mat-grid">${S.mats.map((m,i)=>`
      <div class="mat-card anim d${i+1}"><div class="mat-nm">${m.name}</div><div class="mat-r"><span class="mat-l">SG</span><input type="number" step="0.01" value="${m.sg}" class="inp" onchange="S.mats[${i}].sg=parseFloat(this.value)||1;render()"></div><div class="mat-tag">${m.unit}</div></div>`).join('')}</div>
    <div class="sec-title"><span class="sec-dot"></span>Mix Ratio (B : Sand : Water)</div>
    <div class="ratio-row">${['binder','sand','water'].map(k=>`<div class="ratio-item"><label class="ratio-lbl">${k[0].toUpperCase()+k.slice(1)}</label><input type="number" step="0.1" value="${S.r[k]}" class="inp" onchange="S.r['${k}']=parseFloat(this.value)||0;render()"></div>`).join('')}</div>
    <div class="abs-box anim"><div class="abs-title">Absolute Volume → 1 m³</div><div class="abs-grid">
      <div><span class="abs-lbl">Binder</span><span class="abs-val">${fk(av.b)} kg/m³</span></div>
      <div><span class="abs-lbl">Sand</span><span class="abs-val">${fk(av.s)} kg/m³</span></div>
      <div><span class="abs-lbl">Water</span><span class="abs-val">${fk(av.w)} kg/m³</span></div>
    </div></div>`;

  // RESULTS
  const tot=bd.reduce((a,b)=>({c:a.c+b.ck,f:a.f+b.fk,b:a.b+b.bk,s:a.s+b.sk,w:a.w+b.wk}),{c:0,f:0,b:0,s:0,w:0});
  const cols=['#475569','#7a5af8','#059669','#d97706','#0284c7'];
  const lbs=['Cement','Fly Ash','Biochar','Sand','Seawater'];
  const vs=[tot.c,tot.f,tot.b,tot.s,tot.w];
  document.getElementById('p-results').innerHTML=`
    <div class="sec-title" style="margin-top:4px"><span class="sec-dot"></span>Per-Batch Quantities (kg)</div>
    <p class="res-note">Batch vol = ${f(vd.pb*1000,3)} L (${f(vd.pb,6)} m³) per mix</p>
    <div class="res-scroll"><div class="tbl anim">
      <div class="tbl-row tbl-hdr"><div class="tbl-cell c-w">Mix</div><div class="tbl-cell">Cement</div><div class="tbl-cell">Fly Ash</div><div class="tbl-cell">Biochar</div><div class="tbl-cell">Sand</div><div class="tbl-cell">Seawater</div><div class="tbl-cell c-t">Total</div></div>
      ${bd.map(b=>`<div class="tbl-row"><div class="tbl-cell c-w c-b">${b.name}</div><div class="tbl-cell">${fk(b.ck)}</div><div class="tbl-cell">${fk(b.fk)}</div><div class="tbl-cell">${fk(b.bk)}</div><div class="tbl-cell">${fk(b.sk)}</div><div class="tbl-cell">${fk(b.wk)}</div><div class="tbl-cell c-t">${fk(b.tk)}</div></div>`).join('')}
    </div></div>
    <div class="sec-title"><span class="sec-dot"></span>Per-Batch in Grams</div>
    <div class="res-scroll"><div class="tbl anim d2">
      <div class="tbl-row tbl-hdr"><div class="tbl-cell c-w">Mix</div><div class="tbl-cell">Cement</div><div class="tbl-cell">Fly Ash</div><div class="tbl-cell">Biochar</div><div class="tbl-cell">Sand</div><div class="tbl-cell">Seawater</div></div>
      ${bd.map(b=>`<div class="tbl-row"><div class="tbl-cell c-w c-b">${b.name}</div><div class="tbl-cell">${fg(b.ck*1000)}</div><div class="tbl-cell">${fg(b.fk*1000)}</div><div class="tbl-cell">${fg(b.bk*1000)}</div><div class="tbl-cell">${fg(b.sk*1000)}</div><div class="tbl-cell">${fg(b.wk*1000)}</div></div>`).join('')}
    </div></div>
    <div class="sec-title"><span class="sec-dot"></span>Volume per Specimen</div>
    <div class="res-scroll"><div class="tbl anim d3">
      <div class="tbl-row tbl-hdr"><div class="tbl-cell c-2x">Specimen</div><div class="tbl-cell">Unit (L)</div><div class="tbl-cell">Count</div><div class="tbl-cell">Total (L)</div><div class="tbl-cell">Total (m³)</div></div>
      ${vd.sv.map(s=>`<div class="tbl-row"><div class="tbl-cell c-2x c-b">${s.name}</div><div class="tbl-cell">${f(s.ul,4)}</div><div class="tbl-cell">${s.count}</div><div class="tbl-cell">${f(s.tl,3)}</div><div class="tbl-cell">${f(s.tv,6)}</div></div>`).join('')}
    </div></div>
    <div class="sec-title"><span class="sec-dot"></span>Overall Required (All ${S.nMix} Mixes)</div>
    <div class="ov-grid">${lbs.map((l,i)=>`
      <div class="ov-card anim d${i+1}" style="border-left-color:${cols[i]}"><div class="ov-lbl">${l}</div><div class="ov-kg">${fk(vs[i])} kg</div><div class="ov-g">${fg(vs[i]*1000)} g</div><div class="ov-lb">≈ ${f(vs[i]*2.20462,1)} lb</div></div>`).join('')}</div>`;

  // CHARTS
  const cc=['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)'];
  const maxT=Math.max(...bd.map(b=>b.tk),0.001);
  const pieT=vs.reduce((a,v)=>a+v,0);let cum=0;
  const slices=vs.map((v,i)=>{const p=v/pieT,ang=p*360,st=cum;cum+=ang;return{l:lbs[i],p,st,ang,c:cols[i]}}).filter(s=>s.p>0);

  document.getElementById('p-charts').innerHTML=`
    <div class="sec-title" style="margin-top:4px"><span class="sec-dot"></span>Material Breakdown per Mix (kg)</div>
    <div class="chart-box anim">
      <div class="bar-chart">${bd.map((b,bi)=>{
        const ps=[{v:b.ck,c:cc[0]},{v:b.fk,c:cc[1]},{v:b.bk,c:cc[2]},{v:b.sk,c:cc[3]},{v:b.wk,c:cc[4]}];
        return`<div class="bar-group"><div class="bar-stack">${ps.filter(p=>p.v>0).map((p,pi)=>`<div class="bar" style="height:${(p.v/maxT*100).toFixed(1)}%;background:${p.c};animation-delay:${(bi*.1+pi*.05).toFixed(2)}s" title="${fk(p.v)} kg"></div>`).join('')}</div><div class="bar-label">${b.name}</div></div>`}).join('')}</div>
      <div class="legend">${lbs.map((l,i)=>`<div class="leg-item"><div class="leg-dot" style="background:${cc[i]}"></div>${l}</div>`).join('')}</div>
    </div>
    <div class="sec-title"><span class="sec-dot"></span>Overall Material Distribution</div>
    <div class="chart-box anim d2">
      <div class="pie-wrap">
        <svg class="pie-svg" viewBox="0 0 200 200">
          ${slices.map(s=>`<path d="${pieArc(100,100,90,s.st,s.st+s.ang)}" fill="${s.c}" stroke="var(--card)" stroke-width="2"><title>${s.l}: ${(s.p*100).toFixed(1)}%</title></path>`).join('')}
          <circle cx="100" cy="100" r="40" fill="var(--card)"/>
          <text x="100" y="96" text-anchor="middle" font-size="11" fill="var(--text3)" font-family="var(--sans)" font-weight="600">Total</text>
          <text x="100" y="114" text-anchor="middle" font-size="14" fill="var(--text)" font-family="var(--mono)" font-weight="700">${fk(pieT)} kg</text>
        </svg>
        <div class="pie-leg">${slices.map(s=>`<div class="pie-item"><div class="pie-dot" style="background:${s.c}"></div><span class="pie-txt">${s.l}</span><span class="pie-pct">${(s.p*100).toFixed(1)}%</span></div>`).join('')}</div>
      </div>
    </div>
    <div class="sec-title"><span class="sec-dot"></span>Binder Composition (%)</div>
    <div class="chart-box anim d3">
      <div class="bar-chart" style="height:180px">${bd.map((b,bi)=>{
        const ps=[{v:b.cement,c:cc[0],l:'C'},{v:b.flyash,c:cc[1],l:'FA'},{v:b.biochar,c:cc[2],l:'BC'}];
        return`<div class="bar-group"><div class="bar-stack">${ps.filter(p=>p.v>0).map((p,pi)=>`<div class="bar" style="height:${p.v}%;background:${p.c};animation-delay:${(bi*.1+pi*.05).toFixed(2)}s" title="${p.l}: ${p.v}%"></div>`).join('')}</div><div class="bar-label">${b.name}</div></div>`}).join('')}</div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--c1)"></div>Cement</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--c2)"></div>Fly Ash</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--c3)"></div>Biochar</div>
      </div>
    </div>`;
}

function uSpec(el){const s=S.specs.find(x=>x.id===el.dataset.sid);if(s){s.count=Math.max(0,parseInt(el.value)||0);render()}}
function uMix(i,fld,val){S.mixes[i][fld]=Math.max(0,Math.min(100,parseFloat(val)||0));render()}
function addMix(){S.mixes.push({id:'m'+Date.now(),name:'Mix '+(S.mixes.length+1),cement:100,flyash:0,biochar:0});S.nMix=S.mixes.length;render()}
function rmMix(i){S.mixes.splice(i,1);S.nMix=S.mixes.length;render()}

render();
</script>
</body>
</html>
